name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hakuna
          POSTGRES_PASSWORD: hakuna
          POSTGRES_DB: hakuna_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt && pip install ruff pytest pytest-asyncio
      - name: Lint
        working-directory: backend
        run: ruff check app/
      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://hakuna:hakuna@localhost:5432/hakuna_test
          CELERY_DATABASE_URL: postgresql://hakuna:hakuna@localhost:5432/hakuna_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          alembic upgrade head
          pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build
