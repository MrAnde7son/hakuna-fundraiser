name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  # Serialize deploys per-ref so two pushes to main can't race image pushes
  # and `gcloud run deploy`. Non-main branches are safe to cancel.
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: prod

    # Required for google-github-actions/auth via Workload Identity Federation.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || 'hakuna-prod-2026' }}

      - name: Deploy
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'hakuna-prod-2026' }}
          REGION: ${{ vars.GCP_REGION || 'me-west1' }}
          ZONE: ${{ vars.GCP_ZONE || 'me-west1-b' }}
          REPO: hakuna-fundraiser
          GITHUB_SHA: ${{ github.sha }}
        run: scripts/deploy.sh
