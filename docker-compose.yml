services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hakuna
      POSTGRES_PASSWORD: hakuna
      POSTGRES_DB: hakuna
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hakuna"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hakuna:hakuna@db:5432/hakuna
      REDIS_URL: redis://redis:6379/0
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ~/.config/gcloud:/root/.config/gcloud:ro
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hakuna:hakuna@db:5432/hakuna
      CELERY_DATABASE_URL: postgresql://hakuna:hakuna@db:5432/hakuna
      REDIS_URL: redis://redis:6379/0
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ~/.config/gcloud:/root/.config/gcloud:ro
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=3

  scheduler:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hakuna:hakuna@db:5432/hakuna
      CELERY_DATABASE_URL: postgresql://hakuna:hakuna@db:5432/hakuna
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.worker beat --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  pgdata:
